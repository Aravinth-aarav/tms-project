name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    # trigger pipeline
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set version
        run: echo "VERSION=v1" >> $GITHUB_ENV

      # 🔹 Build Backend Image
      - name: Build Backend Image
        run: docker build -t aravinth2005/tms-server:${{ env.VERSION }} ./server

      - name: Push Backend Image
        run: docker push aravinth2005/tms-server:${{ env.VERSION }}

      # 🔹 Build Frontend Image
      - name: Build Frontend Image
        run: docker build -t aravinth2005/tms-client:${{ env.VERSION }} ./client

      - name: Push Frontend Image
        run: docker push aravinth2005/tms-client:${{ env.VERSION }}
